name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release-tag.outputs.tag }}
      prerelease: ${{ steps.release-tag.outputs.prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+(\.[0-9]+)*([.-][0-9A-Za-z.-]+)?$'; then
            echo "Release tags must look like v1.0 or v1.0.0"
            exit 1
          fi

          if printf '%s' "$tag" | grep -Eq '-'; then
            prerelease=true
          else
            prerelease=false
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists on main
        run: |
          tag="${{ steps.release-tag.outputs.tag }}"
          git fetch origin main --tags

          if ! git rev-parse --verify --quiet "refs/tags/$tag"; then
            echo "Tag $tag does not exist"
            exit 1
          fi

          tagged_commit="$(git rev-list -n 1 "$tag")"
          if ! git merge-base --is-ancestor "$tagged_commit" origin/main; then
            echo "Tag $tag points to $tagged_commit, which is not reachable from origin/main"
            exit 1
          fi

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: cds-linux-x86_64
          - name: macos-aarch64
            os: macos-14
            archive: cds-macos-aarch64
          - name: macos-x86_64
            os: macos-13
            archive: cds-macos-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release
        shell: bash
        run: |
          package="${{ matrix.archive }}-${{ needs.validate.outputs.tag }}"
          mkdir -p "dist/$package"
          cp target/release/cds "dist/$package/"
          cp README.md "dist/$package/"
          cp AGENTS.md "dist/$package/"
          tar -C dist -czf "dist/$package.tar.gz" "$package"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: ${{ needs.validate.outputs.tag }}
          prerelease: ${{ needs.validate.outputs.prerelease }}
          generate_release_notes: true
          files: dist/*.tar.gz
