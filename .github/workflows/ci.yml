name: CI

on:
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/ci.yml"
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "migrations/**/*.sql"
      - "tests/**/*.sh"
      - "install.sh"
  pull_request:
    branches:
      - dev
    paths:
      - ".github/workflows/ci.yml"
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "migrations/**/*.sql"
      - "tests/**/*.sh"
      - "install.sh"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install shell test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: |
          cargo test --lib --bins
          cargo test --test shell_integration
          cargo test --doc

  cd-equivalence:
    name: Docker cd Equivalence
    runs-on: ubuntu-latest
    needs: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache Docker Cargo data
        uses: actions/cache@v5
        with:
          path: target/docker-cache
          key: docker-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            docker-cargo-${{ runner.os }}-

      - name: Show Docker version
        run: docker version

      - name: Run Docker cd equivalence test
        env:
          CDS_DOCKER_IMAGE: rust:1
        run: cargo test --test docker_cd_equivalence -- --nocapture
