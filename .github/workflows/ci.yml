name: CI

on:
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/ci.yml"
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "migrations/**/*.sql"
      - "tests/**/*.sh"
      - "install.sh"
  pull_request:
    branches:
      - dev
    paths:
      - ".github/workflows/ci.yml"
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "migrations/**/*.sql"
      - "tests/**/*.sh"
      - "install.sh"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: |
          cargo test --lib --bins
          cargo test --tests
          cargo test --doc
